name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to publish (d2c, skills, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - d2c
          - skills
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'skills/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish d2c
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.packages == 'd2c' || github.event.inputs.packages == 'both') || github.event_name != 'workflow_dispatch' }}
        run: npm publish --access=public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install skills dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.packages == 'skills' || github.event.inputs.packages == 'both') || github.event_name != 'workflow_dispatch' }}
        run: npm install
        working-directory: ./skills

      - name: Publish skills
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.packages == 'skills' || github.event.inputs.packages == 'both') || github.event_name != 'workflow_dispatch' }}
        run: npm publish --access=public
        working-directory: ./skills
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}